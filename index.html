<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In Concept LLC</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<header>
  <div class="logo">
    <svg width="200" height="60" viewBox="0 0 280 70" xmlns="http://www.w3.org/2000/svg"> <text x="0" y="40" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" stroke="#00A3E0" stroke-width="0.5"> InConcept </text> <text x="0" y="60" font-family="Inter, sans-serif" font-size="12" fill="#00A3E0"> Smart Accounting </text> </svg>
  </div>

  <div class="menu-toggle" id="menuToggle">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <nav id="navMenu">
    <a href="#home" data-key="nav_home"></a>
    <a href="#about" data-key="nav_about"></a>
    <a href="#services" data-key="nav_services"></a>
    <a href="#contact" data-key="nav_contact"></a>

    <div class="lang-switch mobile-lang">
      <button onclick="setLang('hy')">HY</button>
      <button onclick="setLang('ru')">RU</button>
      <button onclick="setLang('en')">EN</button>
    </div>
  </nav>

  <div class="lang-switch desktop-lang text-xs">
    <button onclick="setLang('hy')">HY</button>
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
  </div>
</header>

<section class="hero" id="home">
  <div  class="hero-overlay"></div>

  <div class="hero-content reveal">
    <h1 data-key="hero_title"></h1>
    <p data-key="hero_sub"></p>
    <a href="#contact" class="hero-btn" data-key="contact_title"></a>
  </div>
</section>

<section id="about" class="reveal">
  <h2 class="font-medium text-4xl text-center mb-4" data-key="about_title"></h2>
  <div class="card">
    <p data-key="about_text"></p>
  </div>
</section>

<section id="services" class="reveal">
  <h2 class="font-medium text-4xl text-center mb-4" data-key="services_title"></h2>

  <div class="accordion">

    <div class="accordion-item">
      <button class="accordion-header" data-key="s1_title"></button>
      <div class="accordion-content">
        <p data-key="s1_text"></p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header" data-key="s2_title"></button>
      <div class="accordion-content">
        <p data-key="s2_text"></p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header" data-key="s3_title"></button>
      <div class="accordion-content">
        <p data-key="s3_text"></p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header" data-key="s4_title"></button>
      <div class="accordion-content">
        <p data-key="s4_text"></p>
      </div>
    </div>

  </div>
</section>

<section id="contact" class="reveal">
  <h2 class="font-medium text-4xl text-center mb-4" data-key="contact_title"></h2>

  <div class="card contact-info">
    <h3 clas="text-center">Ին Քոնսեփթ ՍՊԸ</h3>

    <br>

    <iframe
      src="https://www.google.com/maps?q=40.205784,44.540334&hl=es;z=14&output=embed"
      width="100%"
      height="300"
      style="border:0; border-radius:10px;"
      allowfullscreen=""
      loading="lazy">
    </iframe>

    <br><br>

    <div class="p-[22px] rounded-[8px]">
      <div class="grid gap-6 md:grid-cols-3 max-w-5xl mx-auto max-w-[952px] mt-12">
        <div class="p-6 bg-white rounded-2xl shadow hover:shadow-lg transition text-[#101828] font-medium text-[18px] text-center">
          <img class="mx-auto mb-4" src="assets/Message.png" alt="message">
          <span>Email</span><br>
          <a href="mailto:info@senkatech.com" class="text-[#00A3E0] hover:underline">inconceptac@dmail.com</a>
        </div>

        <!-- Phone -->
        <div class="p-6 bg-white rounded-2xl shadow hover:shadow-lg transition text-[#101828] font-medium text-[18px] text-center">
          <img class="mx-auto mb-4" src="assets/Phone.png" alt="phone">
          <span>Phone</span><br>
          <a href="tel:+15551234567" class="text-[#00A3E0] hover:underline">+374 33150300</a>
        </div>

        <!-- Address -->
        <div class="p-6 bg-white rounded-2xl shadow hover:shadow-lg transition text-[#101828] font-medium text-[18px] text-center">
          <img class="mx-auto mb-4" src="assets/Map.png" alt="map">
          <span>Address</span><br>
          <span class="text-[#00A3E0]"> ք. Երևան, Ադոնցի փ. 2/4, 8 մասնաշենք</span>
        </div>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 In Concept LLC
</footer>

<script src="script.js"></script>
</body>
</html>
