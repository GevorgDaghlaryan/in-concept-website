<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In Concept LLC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">IN CONCEPT</div>

  <div class="menu-toggle" id="menuToggle">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <nav id="navMenu">
    <a href="#home" data-key="nav_home"></a>
    <a href="#about" data-key="nav_about"></a>
    <a href="#services" data-key="nav_services"></a>
    <a href="#contact" data-key="nav_contact"></a>

    <div class="lang-switch mobile-lang">
      <button onclick="setLang('hy')">HY</button>
      <button onclick="setLang('ru')">RU</button>
      <button onclick="setLang('en')">EN</button>
    </div>
  </nav>

  <div class="lang-switch desktop-lang">
    <button onclick="setLang('hy')">HY</button>
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
  </div>
</header>

<section class="hero" id="home">
  <div class="hero-overlay"></div>

  <div class="hero-content reveal">
    <h1 data-key="hero_title"></h1>
    <p data-key="hero_sub"></p>
    <a href="#contact" class="hero-btn" data-key="contact_title"></a>
  </div>
</section>

<section id="about" class="reveal">
  <h2 data-key="about_title"></h2>
  <div class="card">
    <p data-key="about_text"></p>
  </div>
</section>

<section id="services" class="reveal">
  <h2 data-key="services_title"></h2>

  <div class="accordion">

    <div class="accordion-item">
      <button class="accordion-header" data-key="s1_title"></button>
      <div class="accordion-content">
        <p data-key="s1_text"></p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header" data-key="s2_title"></button>
      <div class="accordion-content">
        <p data-key="s2_text"></p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header" data-key="s3_title"></button>
      <div class="accordion-content">
        <p data-key="s3_text"></p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header" data-key="s4_title"></button>
      <div class="accordion-content">
        <p data-key="s4_text"></p>
      </div>
    </div>

  </div>
</section>

<section id="contact" class="reveal">
  <h2 data-key="contact_title"></h2>

  <div class="card contact-info">
    <h3>Ին Քոնսեփթ ՍՊԸ</h3>

    <p><strong data-key="office_address_title"></strong></p>
    <p>
      ք. Երևան, Ադոնցի փ. 2/4, 8 մասնաշենք<br>
      1 մուտք, 3-րդ հարկ
    </p>

    <p><strong data-key="phone_title"></strong></p>
    <p>+374 33150300</p>

    <br>

    <iframe
      src="https://www.google.com/maps?q=40.205784,44.540334&hl=es;z=14&output=embed"
      width="100%"
      height="300"
      style="border:0; border-radius:10px;"
      allowfullscreen=""
      loading="lazy">
    </iframe>

    <br><br>

    <form class="formal-form" onsubmit="return validateForm()">
      <input type="text" id="name" data-key-placeholder="form_name" required>
      <input type="email" id="email" data-key-placeholder="form_email" required>
      <input type="text" id="subject" data-key-placeholder="form_subject" required>
      <textarea id="message" rows="5" data-key-placeholder="form_message" required></textarea>
      <button type="submit" data-key="send_btn"></button>
    </form>

  </div>
</section>

<footer>
  © 2026 In Concept LLC
</footer>

<script src="script.js"></script>
</body>
</html>
